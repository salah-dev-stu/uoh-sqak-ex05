name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies (no heavy extra — tests are fully mocked)
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: File line limit (<=150 logical)
        run: uv run python scripts/check_file_lines.py

      - name: Tests + coverage (fail under 85%)
        run: uv run pytest --cov-fail-under=85
